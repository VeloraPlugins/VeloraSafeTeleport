name: Bug Report
description: Report a bug with VeloraSafeTeleport
title: "[Bug]: "
labels: ["bug: unconfirmed"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        Before submitting:
        1. Make sure you are using the latest version of VeloraSafeTeleport.
        2. Make sure the issue has not already been reported.
        3. Please report only **one bug per issue**.
        4. Do not use temporary Discord media links.

  - type: textarea
    id: bug_description
    attributes:
      label: Describe the bug
      description: Describe the issue in as much detail as possible.
    validations:
      required: true

  - type: textarea
    id: reproduction_steps
    attributes:
      label: How to reproduce
      description: Please provide clear step-by-step instructions.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: dropdown
    id: teleport_cause
    attributes:
      label: Teleport cause
      description: Which teleport type was involved?
      options:
        - Ender Pearl
        - Chorus Fruit
        - Command
        - Plugin
        - Nether Portal
        - End Portal
        - End Gateway
        - Spectate
        - Dismount
        - Exit Bed
        - Unknown
    validations:
      required: true

  - type: input
    id: plugin_version
    attributes:
      label: Plugin version
      placeholder: "e.g. 1.0.0-BETA"
    validations:
      required: true

  - type: input
    id: server_version
    attributes:
      label: Server version
      placeholder: "e.g. Paper 1.21.1"
    validations:
      required: true

  - type: textarea
    id: relevant_config
    attributes:
      label: Relevant config section
      description: Paste the relevant part of your config if it may be related to the issue.
      render: yml
    validations:
      required: false

  - type: textarea
    id: screenshots_videos
    attributes:
      label: Screenshots / Videos
      description: Add screenshots or video links if available.
      placeholder: |
        https://imgur.com/example
        https://gyazo.com/example
    validations:
      required: false

  - type: input
    id: server_log
    attributes:
      label: Server log
      description: Upload logs/latest.log to a paste service such as mclo.gs or mcpaste.io.
      placeholder: "e.g. https://mclo.gs/abcdefg"
    validations:
      required: false

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I am using the latest available version of VeloraSafeTeleport
          required: true
        - label: I have checked that this issue has not already been reported
          required: true
        - label: I only included one bug in this report
          required: true
        - label: I did not use temporary Discord media links
          required: true
