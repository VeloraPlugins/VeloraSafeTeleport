name: Feature Request
description: Suggest a feature or improvement for VeloraSafeTeleport
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement for VeloraSafeTeleport.

  - type: textarea
    id: feature_description
    attributes:
      label: Describe the feature
      description: Describe the feature or improvement you would like to see.
    validations:
      required: true

  - type: textarea
    id: problem_solved
    attributes:
      label: What problem does this solve?
      description: Explain why this would be useful.
    validations:
      required: true

  - type: textarea
    id: extra_context
    attributes:
      label: Additional context
      description: Add examples, use cases, or screenshots if helpful.
    validations:
      required: false

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: This is a feature request and not a bug report
          required: true
        - label: I have checked that this feature has not already been suggested
          required: true
