name: Feature Request
description: Suggest a feature or improvement for VeloraSafeTeleport
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature for VeloraSafeTeleport.

  - type: textarea
    id: feature-description
    attributes:
      label: Describe the feature
      description: Describe the feature or improvement you would like to see.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Explain what issue, limitation, or use case this feature would help with.
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add any extra context, examples, or screenshots here.
    validations:
      required: false

  - type: input
    id: confirmation
    attributes:
      label: Confirm feature request
      description: Type **I confirm** to confirm this is a feature request and not a bug report.
      placeholder: 'Type "I confirm" here'
    validations:
      required: true
      pattern: '^I confirm$'
